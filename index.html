<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuke Scheduler</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .box {
    background: #222;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
  }

  input, button, select {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border-radius: 6px;
    border: none;
    font-size: 16px;
  }

  button {
    background: #e63946;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #c62828;
  }

  #dateSection {
    display: none;
  }

  #result {
    margin-top: 20px;
    color: #7CFC00;
    font-size: 18px;
  }

  #countdown {
    font-size: 40px;
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Who would you like to nuke?</h2>

  <input type="text" id="target" placeholder="Type anything...">

  <div id="dateSection">

    <input type="date" id="date">

    <select id="size">
      <option value="">How big do you want the nuke?</option>
      <option>Tiny</option>
      <option>Small</option>
      <option>Normal</option>
      <option>Large</option>
      <option>Extra large</option>
      <option>HUGE</option>
    </select>

    <button onclick="finish()">Schedule</button>
  </div>

  <div id="countdown"></div>
  <div id="result"></div>
</div>

<script>
const target = document.getElementById("target");
const dateSection = document.getElementById("dateSection");

target.addEventListener("input", () => {
  dateSection.style.display = target.value.trim() ? "block" : "none";
});

function finish() {
  const name = target.value.trim();
  const date = document.getElementById("date").value;
  const size = document.getElementById("size").value;

  if (!date) {
    alert("Please choose a date.");
    return;
  }

  if (!size) {
    alert("Please choose a size.");
    return;
  }

  const countdownEl = document.getElementById("countdown");
  const resultEl = document.getElementById("result");

  let count = 3;
  countdownEl.textContent = count;
  resultEl.textContent = "";

  const interval = setInterval(() => {
    count--;

    if (count > 0) {
      countdownEl.textContent = count;
    } else {
      clearInterval(interval);
      countdownEl.textContent = "";

      resultEl.innerHTML =
        `✅ SUCCESS!<br><br>
         Target: <b>${name}</b><br>
         Date: <b>${date}</b><br>
         Size: <b>${size}</b><br><br>
         Operation complete.`;

    }
  }, 1000);
}
</script>

</body>
</html>
