<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuke Scheduler</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #222;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #e63946;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #c62828;
    }

    #dateSection {
      display: none;
    }

    #result {
      margin-top: 20px;
      color: #7CFC00;
    }
  </style>
</head>
<body>

<div class="box">
 <h2>Select a country</h2>

<input type="text" id="countrySearch" placeholder="Search country...">

<select id="countrySelect" size="8"></select>
  <script>
const countries = [
  "England","Scotland","Wales","Northern Ireland",
  "United States",
  "Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia",
  "Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados",
  "Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina",
  "Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde",
  "Cambodia","Cameroon","Canada","Central African Republic","Chad","Chile","China",
  "Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic",
  "Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador",
  "Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland",
  "France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala",
  "Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India",
  "Indonesia","Iran","Iraq","Ireland","Israel","Italy","Ivory Coast","Japan",
  "Jordan","Kazakhstan","Kenya","Kuwait","Kyrgyzstan","Laos","Latvia",
  "Lebanon","Liberia","Libya","Lithuania","Luxembourg",
  "Madagascar","Malaysia","Maldives","Mali","Malta","Mexico","Moldova","Monaco",
  "Mongolia","Montenegro","Morocco","Mozambique","Nepal","Netherlands","New Zealand",
  "Nigeria","North Korea","North Macedonia","Norway","Pakistan","Panama","Paraguay",
  "Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Saudi Arabia",
  "Senegal","Serbia","Singapore","Slovakia","Slovenia","Somalia","South Africa",
  "South Korea","Spain","Sri Lanka","Sudan","Sweden","Switzerland","Syria",
  "Thailand","Tunisia","Turkey","Ukraine","United Arab Emirates","Uruguay","Uzbekistan",
  "Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"
];

const search = document.getElementById("countrySearch");
const select = document.getElementById("countrySelect");

// populate dropdown
function render(list) {
  select.innerHTML = "";
  list.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}

render(countries);

// filter on typing
search.addEventListener("input", () => {
  const val = search.value.toLowerCase().trim();

  const filtered = countries.filter(c =>
    c.toLowerCase().startsWith(val)
  );

  render(filtered.length ? filtered : countries);
});

// optional: sync selection back into input
select.addEventListener("change", () => {
  search.value = select.value;
});
</script>
  >

  <div id="dateSection">
    <input type="date" id="date">
    <button onclick="finish()">Schedule</button>
  </div>

  <div id="result"></div>
</div>

<script>
const target = document.getElementById("target");
const dateSection = document.getElementById("dateSection");

target.addEventListener("input", () => {
  dateSection.style.display = target.value.trim() ? "block" : "none";
});

function finish() {
  const name = target.value.trim();
  const date = document.getElementById("date").value;

  if (!date) {
    alert("Please choose a date.");
    return;
  }

  document.getElementById("result").innerHTML =
    `✅Nuke scheduled!<br><br>
     Target: <b>${name}</b><br>
     Date: <b>${date}</b><br><br>
     This cannot be cancelled.`;
}
</script>

</body>
</html>
