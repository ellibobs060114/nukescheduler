<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuke Scheduler</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .box {
    background: #222;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
  }

  input, button, select {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border-radius: 6px;
    border: none;
    font-size: 16px;
  }

  button {
    background: #e63946;
    color: white;
    cursor: pointer;
    opacity: 1;
  }

  button:disabled {
    background: #555;
    cursor: not-allowed;
  }

  #dateSection {
    display: none;
  }

  #result {
    margin-top: 20px;
    color: #7CFC00;
    font-size: 18px;
  }

  #countdown {
    font-size: 40px;
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Who would you like to nuke?</h2>

  <input type="text" id="target" placeholder="Type anything...">

  <div id="dateSection">

    <input type="date" id="date">

    <select id="size">
      <option value="">How big do you want the nuke?</option>
      <option>Tiny</option>
      <option>Small</option>
      <option>Normal</option>
      <option>Large</option>
      <option>Extra large</option>
      <option>HUGE</option>
    </select>

    <button id="scheduleBtn" onclick="finish()" disabled>Schedule</button>
  </div>

  <div id="countdown"></div>
  <div id="result"></div>
</div>

<script>
const target = document.getElementById("target");
const dateSection = document.getElementById("dateSection");
const dateInput = document.getElementById("date");
const sizeInput = document.getElementById("size");
const scheduleBtn = document.getElementById("scheduleBtn");

target.addEventListener("input", () => {
  dateSection.style.display = target.value.trim() ? "block" : "none";
  checkForm();
});

dateInput.addEventListener("input", checkForm);
sizeInput.addEventListener("change", checkForm);

function checkForm() {
  const nameFilled = target.value.trim() !== "";
  const dateFilled = dateInput.value !== "";
  const sizeFilled = sizeInput.value !== "";

  scheduleBtn.disabled = !(nameFilled && dateFilled && sizeFilled);
}

function finish() {
  const name = target.value.trim();
  const date = dateInput.value;
  const size = sizeInput.value;

  const countdownEl = document.getElementById("countdown");
  const resultEl = document.getElementById("result");

  scheduleBtn.disabled = true;

  let count = 3;
  countdownEl.textContent = count;
  resultEl.textContent = "";

  const interval = setInterval(() => {
    count--;

    if (count > 0) {
      countdownEl.textContent = count;
    } else {
      clearInterval(interval);
      countdownEl.textContent = "";

      resultEl.innerHTML =
        `✅ SUCCESS!<br><br>
        Target: <b>${name}</b><br>
        Date: <b>${date}</b><br>
        Size: <b>${size}</b><br><br>
        Operation complete.`;
    }
  }, 1000);
}
</script>

</body>
</html>
